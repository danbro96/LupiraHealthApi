# lupira-health-api — TrueNAS Custom App `lupira-health-api`.
# Single .NET 10 service: REST (/api) for health-record/device management + location/ring telemetry ingest & query,
# over its OWN Postgres (lupira_health). Sensitive data is isolated in a separate DB+role from lupira-cal.
services:
  lupira-health-api:
    image: danbro96/lupira-health-api:${IMAGE_TAG:-latest}
    container_name: lupira-health-api
    environment:
      # Postgres — Marten `health` schema + raw `telemetry` schema in one DB. NO grant on lupira_cal (and vice-versa).
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=lupira_health;Username=lupira_health_user;Password=${LUPIRA_HEALTH_DB_PASSWORD:?required}"

      # /api auth — Authentik OIDC (JWT). Same issuer as lupira-cal; the OIDC `sub` is the only cross-service join key.
      Auth__Authority: ${AUTH_AUTHORITY:-https://auth.lupira.com/application/o/lupira-health/}
      Auth__Audience: ${AUTH_AUDIENCE:-lupira-health}

      # Telemetry ingest auth is per-device API key (minted at device registration) — no extra config.

      # Reverse-geocoding for place labels — self-hosted Nominatim. Empty disables it (cache-only / coarse).
      Nominatim__BaseUrl: ${NOMINATIM_BASE_URL:-}

      # Telemetry retention + maintenance.
      Telemetry__LocationRetentionDays: ${LOCATION_RETENTION_DAYS:-90}
      Telemetry__MaintenanceEnabled: ${TELEMETRY_MAINTENANCE_ENABLED:-true}

      # OTEL — same Basic Auth header convention as the other .NET apps (http/protobuf; 5-min metric cadence).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-300000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod,host.name=medelynas,service.name=lupira-health-api}
    ports:
      - "${HOST_PORT:-41180}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/readyz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - default
      - medelynas_data         # Postgres
      - medelynas_telemetry    # OTel collector
networks:
  default:
    driver: bridge
  medelynas_data:
    external: true
    name: medelynas_data
  medelynas_telemetry:
    external: true
    name: medelynas_telemetry
